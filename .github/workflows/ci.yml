name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust (for survey-wasm)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/**/Cargo.lock', 'backend/**/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build survey-wasm
        working-directory: ${{ github.workspace }}
        run: npm --prefix frontend run build:wasm

      - name: Test survey-core (Rust)
        working-directory: backend
        run: cargo test -p survey-core

      - name: Write frontend/.env from secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL secret is not set}"
          : "${VITE_SUPABASE_ANON_KEY:?VITE_SUPABASE_ANON_KEY secret is not set}"
          {
            printf 'VITE_SUPABASE_URL=%s\n' "$VITE_SUPABASE_URL"
            printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$VITE_SUPABASE_ANON_KEY"
          } > .env

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
