name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  SITESURVEYOR_LICENSE_PUBLIC_KEY: ${{ secrets.SITESURVEYOR_LICENSE_PUBLIC_KEY }}

jobs:
  build:
    name: Desktop (${{ matrix.target || matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify licensing public key
        shell: bash
        run: |
          KEY="${SITESURVEYOR_LICENSE_PUBLIC_KEY:-}"
          if ! printf '%s' "$KEY" | grep -Eq '^[0-9a-fA-F]{64}$'; then
            echo "::error::SITESURVEYOR_LICENSE_PUBLIC_KEY secret is missing or not 64 hex chars. Release builds will reject every license."
            exit 1
          fi
          echo "Licensing public key present (64 hex chars)."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsqlite3-dev

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-${{ matrix.platform }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-${{ matrix.platform }}-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.platform }}-${{ matrix.target || 'default' }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.platform }}-${{ matrix.target || 'default' }}-

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Write frontend .env
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL secret is not set}"
          : "${VITE_SUPABASE_ANON_KEY:?VITE_SUPABASE_ANON_KEY secret is not set}"
          {
            printf 'VITE_SUPABASE_URL=%s\n' "$VITE_SUPABASE_URL"
            printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$VITE_SUPABASE_ANON_KEY"
          } > .env

      - name: Write licensing public key
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          : "${SITESURVEYOR_LICENSE_PUBLIC_KEY:?SITESURVEYOR_LICENSE_PUBLIC_KEY secret is not set}"
          printf 'SITESURVEYOR_LICENSE_PUBLIC_KEY=%s\n' "$SITESURVEYOR_LICENSE_PUBLIC_KEY" > .env.licensing

      - name: Detect Apple signing secrets
        id: apple
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Build Tauri app (with Apple signing)
        if: runner.os == 'macOS' && steps.apple.outputs.enabled == 'true'
        shell: bash
        working-directory: backend
        run: npx --prefix ../frontend tauri build ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app (unsigned)
        if: steps.apple.outputs.enabled != 'true'
        shell: bash
        working-directory: backend
        run: npx --prefix ../frontend tauri build ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            backend/target/release/bundle/nsis/*.exe
            backend/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target || 'universal' }}-build
          path: |
            backend/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            backend/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            backend/target/release/bundle/deb/*.deb
            backend/target/release/bundle/appimage/*.AppImage
            backend/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 30

  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify licensing public key
        shell: bash
        run: |
          KEY="${SITESURVEYOR_LICENSE_PUBLIC_KEY:-}"
          if ! printf '%s' "$KEY" | grep -Eq '^[0-9a-fA-F]{64}$'; then
            echo "::error::SITESURVEYOR_LICENSE_PUBLIC_KEY secret is missing or not 64 hex chars. Release builds will reject every license."
            exit 1
          fi
          echo "Licensing public key present (64 hex chars)."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (with retry)
        run: |
          set -e
          NDK_PKG="ndk;27.0.12077973"
          for i in 1 2 3; do
            echo "Attempt $i: installing $NDK_PKG ..."
            rm -rf "$ANDROID_HOME/ndk/27.0.12077973"
            rm -rf "$ANDROID_HOME/ndk-bundle"
            rm -rf "$HOME/.android/cache"
            if sdkmanager --install "$NDK_PKG"; then
              echo "NDK installed successfully."
              exit 0
            fi
            echo "SDK manager failed; waiting 15s before retry..."
            sleep 15
          done
          echo "ERROR: failed to install $NDK_PKG after 3 attempts."
          exit 1

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-android-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-android-

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            backend/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-android-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Write frontend .env
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL secret is not set}"
          : "${VITE_SUPABASE_ANON_KEY:?VITE_SUPABASE_ANON_KEY secret is not set}"
          {
            printf 'VITE_SUPABASE_URL=%s\n' "$VITE_SUPABASE_URL"
            printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$VITE_SUPABASE_ANON_KEY"
          } > .env

      - name: Write licensing public key
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          : "${SITESURVEYOR_LICENSE_PUBLIC_KEY:?SITESURVEYOR_LICENSE_PUBLIC_KEY secret is not set}"
          printf 'SITESURVEYOR_LICENSE_PUBLIC_KEY=%s\n' "$SITESURVEYOR_LICENSE_PUBLIC_KEY" > .env.licensing

      - name: Initialize Android project
        working-directory: backend
        run: npx --prefix ../frontend tauri android init --ci

      - name: Apply SiteSurveyor Android launcher icons
        run: cp -rf backend/icons/android/* backend/gen/android/app/src/main/res/ || true

      - name: Bump minSdk to 26
        working-directory: backend
        run: |
          python3 -c "
          import re, os
          gradle_file = os.path.join('gen/android', 'app', 'build.gradle.kts')
          if os.path.exists(gradle_file):
              with open(gradle_file, 'r') as f:
                  c = f.read()
              c = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 26', c)
              with open(gradle_file, 'w') as f:
                  f.write(c)
              print('Updated minSdk to 26 in build.gradle.kts')
          else:
              gradle_file = os.path.join('gen/android', 'app', 'build.gradle')
              if os.path.exists(gradle_file):
                  with open(gradle_file, 'r') as f:
                      c = f.read()
                  c = re.sub(r'minSdk\s+\d+', 'minSdk 26', c)
                  with open(gradle_file, 'w') as f:
                      f.write(c)
                  print('Updated minSdk to 26 in build.gradle')
          "

      - name: Prepare signing flag
        id: signing
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Decode release keystore
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Configure Android signing
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        working-directory: backend
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '\nsigning.storeFile=/tmp/release.keystore\nsigning.storePassword=%s\nsigning.keyAlias=%s\nsigning.keyPassword=%s\n' \
            "$KS_PASS" "$KEY_ALIAS" "$KEY_PASS" >> gen/android/gradle.properties

      - name: Inject signing into build.gradle
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        working-directory: backend
        run: |
          python3 -c "
          import re, os
          gradle_file = os.path.join('gen/android', 'app', 'build.gradle.kts')
          if not os.path.exists(gradle_file):
              gradle_file = os.path.join('gen/android', 'app', 'build.gradle')

          with open(gradle_file, 'r') as f:
              c = f.read()

          if 'build.gradle.kts' in gradle_file:
              if 'signingConfigs' not in c:
                  c = c.replace(
                      'buildTypes {',
                      '''signingConfigs {
                  create(\"release\") {
                      storeFile = file(project.property(\"signing.storeFile\") as String)
                      storePassword = project.property(\"signing.storePassword\") as String
                      keyAlias = project.property(\"signing.keyAlias\") as String
                      keyPassword = project.property(\"signing.keyPassword\") as String
                  }
              }
              buildTypes {''',
                      1,
                  )
              c = re.sub(
                  r'(getByName\(\"release\"\)\s*\{)([^}]*?)(isMinifyEnabled)',
                  r'\1\n            signingConfig = signingConfigs.getByName(\"release\")\n            \2\3',
                  c,
                  count=1,
              )
          else:
              if 'signingConfigs' not in c:
                  c = c.replace(
                      'buildTypes {',
                      'signingConfigs {\n        release {\n            storeFile file(signing.storeFile)\n            storePassword signing.storePassword\n            keyAlias signing.keyAlias\n            keyPassword signing.keyPassword\n        }\n    }\n    buildTypes {',
                      1,
                  )
              c = re.sub(
                  r'(release\s*\{[^}]*?)(minify)',
                  r'\1signingConfig signingConfigs.release\n            \2',
                  c,
                  count=1,
              )

          with open(gradle_file, 'w') as f:
              f.write(c)
          print(f'Signing config injected into {gradle_file}')
          "

      - name: Inject debugSymbolLevel into build.gradle
        shell: bash
        working-directory: backend
        run: |
          python3 -c "
          import re, os
          gradle_file = os.path.join('gen/android', 'app', 'build.gradle.kts')
          if not os.path.exists(gradle_file):
              gradle_file = os.path.join('gen/android', 'app', 'build.gradle')

          with open(gradle_file, 'r') as f:
              c = f.read()

          if 'build.gradle.kts' in gradle_file:
              c = re.sub(
                  r'(getByName\(\"release\"\)\s*\{)',
                  r'\1\n            ndk { debugSymbolLevel = \"FULL\" }\n',
                  c
              )
          else:
              c = re.sub(
                  r'(release\s*\{)',
                  r'\1\n            ndk { debugSymbolLevel = \"FULL\" }\n',
                  c
              )

          with open(gradle_file, 'w') as f:
              f.write(c)
          print(f'debugSymbolLevel injected into {gradle_file}')
          "

      - name: Build Android artifacts
        working-directory: backend
        run: npx --prefix ../frontend tauri android build --apk --aab
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Package native debug symbols
        shell: bash
        working-directory: backend
        run: |
          mkdir -p arm64-v8a
          cp target/aarch64-linux-android/release/lib*.so arm64-v8a/ 2>/dev/null || true
          zip -r native-debug-symbols.zip arm64-v8a

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            backend/gen/android/app/build/outputs/apk/**/*.apk
            backend/gen/android/app/build/outputs/bundle/**/*.aab
            backend/native-debug-symbols.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: find artifacts -type f | sort

      - name: Delete previous releases
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching existing releases..."
          tags=$(gh release list --limit 100 --json tagName -q '.[].tagName')
          if [ -z "$tags" ]; then
            echo "No existing releases to delete."
            exit 0
          fi
          for tag in $tags; do
            echo "Deleting release and tag: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*-setup.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
